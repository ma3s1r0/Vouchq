<!-- @dsCard group="Components" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Pagination — table footer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');
  :root{--bg:#0B0E14;--surface:#141922;--surface-2:#1C2230;--border:#2A3242;--border-strong:#3A4459;
        --text:#E6EDF3;--muted:#8B97A8;--dim:#5A6678;--blue:#388BFD}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',system-ui,sans-serif;padding:24px}
  .wrap{max-width:680px;border:1px solid var(--border);border-radius:11px;overflow:hidden;background:var(--surface)}
  /* stub of a table above the pagination, for context */
  .stub{padding:0}
  .stub .hd,.stub .rw{display:grid;grid-template-columns:1fr 90px 80px;gap:12px;padding:10px 16px;font-size:12px}
  .stub .hd{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);font-weight:600;
            background:#0D1119;border-bottom:1px solid var(--border)}
  .stub .rw{border-bottom:1px solid var(--border);color:var(--muted)}
  .stub .rw b{color:var(--text);font-weight:600}
  .pager{display:flex;align-items:center;gap:12px;padding:10px 16px;background:#0D1119}
  .range{font-family:'IBM Plex Mono';font-size:11.5px;color:var(--muted)}
  .range b{color:var(--text);font-weight:500}
  .ctrl{margin-left:auto;display:flex;align-items:center;gap:8px}
  .size{display:inline-flex;align-items:center;gap:7px;font-size:11px;color:var(--dim);letter-spacing:.04em;text-transform:uppercase;font-weight:600}
  select{font-family:'IBM Plex Mono';font-size:12px;color:var(--text);background:var(--surface-2);
         border:1px solid var(--border);border-radius:7px;padding:5px 8px;cursor:pointer}
  select:hover{border-color:var(--border-strong)}
  .nav{display:flex;gap:6px}
  .pg{font-family:inherit;font-size:12px;font-weight:600;color:var(--muted);background:transparent;
      border:1px solid var(--border);border-radius:7px;padding:5px 12px;cursor:pointer;line-height:1}
  .pg:hover{color:var(--text);border-color:var(--border-strong);background:var(--surface-2)}
  .pg[disabled]{color:var(--dim);cursor:not-allowed;opacity:.5}
  .pg:hover[disabled]{background:transparent;border-color:var(--border)}
</style>
</head>
<body>
  <div class="wrap">
    <div class="stub">
      <div class="hd"><span>Name</span><span>Status</span><span>Risk</span></div>
      <div class="rw"><b>greeter</b><span>approved</span><span>12</span></div>
      <div class="rw"><b>helpful-helper</b><span>drifted</span><span>88</span></div>
      <div class="rw"><b>db.query</b><span>pending</span><span>41</span></div>
    </div>
    <div class="pager">
      <span class="range"><b>1–25</b> of <b>128</b></span>
      <div class="ctrl">
        <span class="size">Rows
          <select>
            <option>25</option><option>50</option><option>100</option>
          </select>
        </span>
        <div class="nav">
          <button class="pg" disabled>← Prev</button>
          <button class="pg">Next →</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
