<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Tabs — settings sections</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');
  :root{--bg:#0B0E14;--surface:#141922;--surface-2:#1C2230;--border:#2A3242;--border-strong:#3A4459;
        --text:#E6EDF3;--muted:#8B97A8;--dim:#5A6678;--blue:#388BFD;--ok:#3FB950}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',system-ui,sans-serif;padding:24px}
  .wrap{max-width:680px}
  .tabs{display:flex;gap:2px;border-bottom:1px solid var(--border)}
  .tab{position:relative;display:inline-flex;align-items:center;gap:8px;padding:11px 16px 13px;
       font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;background:none;border:0;
       font-family:inherit;letter-spacing:.01em}
  .tab:hover{color:var(--text)}
  .tab.active{color:var(--text)}
  .tab.active::after{content:"";position:absolute;left:8px;right:8px;bottom:-1px;height:2px;
                     background:var(--blue);border-radius:2px 2px 0 0}
  .tab .count{font-family:'IBM Plex Mono';font-size:10.5px;font-weight:500;color:var(--dim);
              background:var(--surface-2);border:1px solid var(--border);border-radius:999px;padding:1px 7px}
  .tab.active .count{color:var(--blue);border-color:rgba(56,139,253,.35);background:rgba(56,139,253,.10)}
  .panel{border:1px solid var(--border);border-top:0;border-radius:0 0 11px 11px;background:var(--surface);
         padding:18px 20px;min-height:118px}
  .panel-head{font-size:13px;font-weight:600;color:var(--text);margin:0 0 4px}
  .panel-sub{font-size:12px;color:var(--muted);line-height:1.6;margin:0}
  .src-row{display:flex;align-items:center;gap:10px;margin-top:14px;padding:10px 12px;
           border:1px solid var(--border);border-radius:8px;background:#0D1119}
  .src-row .ico{width:8px;height:8px;border-radius:50%;background:var(--ok)}
  .src-row .name{font-size:12.5px;font-weight:600}
  .src-row .path{font-family:'IBM Plex Mono';font-size:11px;color:var(--dim);margin-left:auto}
</style>
</head>
<body>
  <div class="wrap">
    <div class="tabs" role="tablist">
      <button class="tab active" role="tab">Sources<span class="count">4</span></button>
      <button class="tab" role="tab">Notifications</button>
      <button class="tab" role="tab">Members<span class="count">12</span></button>
      <button class="tab" role="tab">Policy</button>
    </div>
    <div class="panel" role="tabpanel">
      <p class="panel-head">Connected sources</p>
      <p class="panel-sub">Registries scanned for Skills, MCP tools, and agent manifests. Drift is checked on every sync.</p>
      <div class="src-row">
        <span class="ico"></span>
        <span class="name">github/acme/skills</span>
        <span class="path">scan · every 5m · last 4m ago</span>
      </div>
      <div class="src-row">
        <span class="ico"></span>
        <span class="name">mcp · internal-tools</span>
        <span class="path">scan · every 5m · last 2m ago</span>
      </div>
    </div>
  </div>
</body>
</html>
