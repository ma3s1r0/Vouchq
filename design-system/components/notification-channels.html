<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Notification channels — settings</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');
  :root{--bg:#0B0E14;--surface:#141922;--surface-2:#1C2230;--border:#2A3242;--border-strong:#3A4459;
        --text:#E6EDF3;--muted:#8B97A8;--dim:#5A6678;--blue:#388BFD;--ok:#3FB950}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);
       font-family:'IBM Plex Sans',system-ui,sans-serif;padding:28px}
  h1{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:600;margin:0 0 6px}
  .sub{font-size:12px;color:var(--dim);margin:0 0 18px;max-width:460px;line-height:1.6}
  .list{max-width:520px;display:flex;flex-direction:column;gap:10px}
  .ch{display:flex;align-items:center;gap:13px;padding:13px 15px;
      background:var(--surface);border:1px solid var(--border);border-radius:11px}
  .ic{width:34px;height:34px;flex:0 0 auto;border-radius:9px;background:var(--surface-2);
      border:1px solid var(--border-strong);display:grid;place-items:center}
  .ic svg{width:17px;height:17px;stroke:var(--text);fill:none;stroke-width:1.8}
  .meta{flex:1;min-width:0}
  .meta .t{font-size:13.5px;font-weight:600}
  .meta .tgt{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--muted);margin-top:2px;
             white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ch.off{opacity:.62}
  .ch.off .ic svg{stroke:var(--dim)}
  .test{background:transparent;color:var(--text);border:1px solid var(--border-strong);border-radius:7px;
        padding:6px 12px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer}
  .test:disabled{color:var(--dim);border-color:var(--border);cursor:not-allowed}
  /* toggle */
  .tg{position:relative;width:38px;height:21px;flex:0 0 auto;cursor:pointer}
  .tg input{opacity:0;width:0;height:0;position:absolute}
  .track{position:absolute;inset:0;background:var(--surface-2);border:1px solid var(--border-strong);
         border-radius:999px;transition:.15s}
  .knob{position:absolute;top:2px;left:2px;width:15px;height:15px;border-radius:50%;
        background:var(--dim);transition:.15s}
  .tg input:checked + .track{background:rgba(63,185,80,.22);border-color:rgba(63,185,80,.5)}
  .tg input:checked + .track .knob{transform:translateX(17px);background:var(--ok)}
</style>
</head>
<body>
  <h1>Notification channels</h1>
  <p class="sub">Self-hosted: all channels are <b>opt-in and off by default</b>. Nothing leaves your
  network until you enable and test a destination.</p>
  <div class="list">
    <div class="ch">
      <span class="ic"><svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3.5 6.5L12 13l8.5-6.5"/></svg></span>
      <div class="meta"><div class="t">Email</div><div class="tgt">security@acme.io</div></div>
      <button class="test">Test</button>
      <label class="tg"><input type="checkbox" checked><span class="track"><span class="knob"></span></span></label>
    </div>
    <div class="ch">
      <span class="ic"><svg viewBox="0 0 24 24"><path d="M10 14a2 2 0 11-2-2h2zM14 10a2 2 0 112 2h-2zM10 10a2 2 0 11-2 2v-2zM14 14a2 2 0 112-2v2z"/></svg></span>
      <div class="meta"><div class="t">Slack</div><div class="tgt">#sec-alerts</div></div>
      <button class="test">Test</button>
      <label class="tg"><input type="checkbox" checked><span class="track"><span class="knob"></span></span></label>
    </div>
    <div class="ch off">
      <span class="ic"><svg viewBox="0 0 24 24"><path d="M14 3l-4 18M6 7l-4 5 4 5M18 7l4 5-4 5"/></svg></span>
      <div class="meta"><div class="t">Webhook</div><div class="tgt">https://hooks.acme.io/vouchq/…</div></div>
      <button class="test" disabled>Test</button>
      <label class="tg"><input type="checkbox"><span class="track"><span class="knob"></span></span></label>
    </div>
  </div>
</body>
</html>
