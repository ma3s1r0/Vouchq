<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Typography — Control Room</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');
  :root{--bg:#0B0E14;--surface:#141922;--border:#2A3242;--text:#E6EDF3;--muted:#8B97A8;--dim:#5A6678}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);
       font-family:'IBM Plex Sans',system-ui,sans-serif;padding:28px}
  h1{font-size:12px;letter-spacing:.16em;text-transform:uppercase;
     color:var(--muted);font-weight:600;margin:0 0 22px}
  .row{display:flex;align-items:baseline;gap:18px;padding:12px 0;border-bottom:1px solid var(--border)}
  .row:last-child{border-bottom:0}
  .tag{flex:0 0 120px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--dim)}
  .display{font-size:30px;font-weight:600;letter-spacing:-.01em}
  .h2{font-size:20px;font-weight:600}
  .body{font-size:14px;font-weight:400;color:var(--text)}
  .small{font-size:12px;color:var(--muted)}
  .mono{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--text)}
  .mono b{color:#3FB950;font-weight:500}
</style>
</head>
<body>
  <h1>Typography · IBM Plex Sans + Mono</h1>
  <div class="row"><div class="tag">display / 30</div><div class="display">128 registered assets</div></div>
  <div class="row"><div class="tag">heading / 20</div><div class="h2">Inventory &amp; approvals</div></div>
  <div class="row"><div class="tag">body / 14</div><div class="body">The pinned definition is the authoritative source of truth.</div></div>
  <div class="row"><div class="tag">small / 12</div><div class="small">Last verified 4 minutes ago · by platform-bot</div></div>
  <div class="row"><div class="tag">mono / 13</div><div class="mono">sha256 <b>a1b2c3d4e5f6</b>7890abcdef…</div></div>
</body>
</html>
